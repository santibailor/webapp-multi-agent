# version: '3.9'

services:

  # ── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: helix-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: autosostitutiva
      POSTGRES_USER: helix
      POSTGRES_PASSWORD: helix_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helix -d autosostitutiva"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Java (Spring Boot) ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend-java/Dockerfile
    container_name: helix-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/autosostitutiva
      SPRING_DATASOURCE_USERNAME: helix
      SPRING_DATASOURCE_PASSWORD: helix_secret
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/customer/requests?page=0&size=1 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend Next.js ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: helix-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080/api/v1
    ports:
      - "3000:3000"

volumes:
  pgdata:
