---
# ───────────────────────────────────────────────────────────────────────────────
# Kubernetes Deployment: Backend Java (Spring Boot 3)
# ───────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helix-backend
  namespace: helix
  labels:
    app: helix-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helix-backend
  template:
    metadata:
      labels:
        app: helix-backend
    spec:
      containers:
        - name: helix-backend
          image: ghcr.io/helix/autosostitutiva-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: helix-db-secret
                  key: datasource-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: helix-db-secret
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: helix-db-secret
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: helix-backend-svc
  namespace: helix
spec:
  selector:
    app: helix-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
# ───────────────────────────────────────────────────────────────────────────────
# Kubernetes Deployment: Frontend Next.js
# ───────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helix-frontend
  namespace: helix
  labels:
    app: helix-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helix-frontend
  template:
    metadata:
      labels:
        app: helix-frontend
    spec:
      containers:
        - name: helix-frontend
          image: ghcr.io/helix/autosostitutiva-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://helix-backend-svc:8080/api/v1"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: helix-frontend-svc
  namespace: helix
spec:
  selector:
    app: helix-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
---
# ───────────────────────────────────────────────────────────────────────────────
# Ingress (NGINX) – routes /api/* → backend, /* → frontend
# ───────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helix-ingress
  namespace: helix
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: helix.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: helix-backend-svc
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: helix-frontend-svc
                port:
                  number: 3000
