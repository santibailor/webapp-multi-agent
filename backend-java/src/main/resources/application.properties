spring.application.name=autosostitutiva

server.port=8080
server.servlet.context-path=/api/v1

# Datasource — override via env vars (SPRING_DATASOURCE_URL, etc.) in Docker/prod
# Default: H2 in-memory for local development
spring.datasource.url=jdbc:h2:mem:autosostitutiva;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
