name: CI/CD — Helix Auto Sostitutiva

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/autosostitutiva-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/autosostitutiva-frontend

jobs:

  # ── 1. Backend: Build & Test ───────────────────────────────────────────────
  backend-ci:
    name: Backend — Build & Test (Java 21 + Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-java

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Run Tests
        run: mvn clean verify -B --no-transfer-progress

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: backend-java/target/surefire-reports/

  # ── 2. Frontend: Build & Lint ─────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Build & Lint (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI types
        run: npx openapi-typescript ../docs/openapi.yaml -o src/api/schema.d.ts

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1

  # ── 3. E2E Tests (Playwright) ─────────────────────────────────────────────
  e2e:
    name: E2E — Playwright Tests
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        working-directory: tests-e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start stack with Docker Compose
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Run Playwright tests
        working-directory: tests-e2e
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests-e2e/playwright-report/

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ── 4. Build & Push Docker Images ─────────────────────────────────────────
  docker-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-java
          file: ./backend-java/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Deploy to Kubernetes ────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig
        env:
          KUBECONFIG: /tmp/kubeconfig

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/autosostitutiva.yaml --namespace=helix
        env:
          KUBECONFIG: /tmp/kubeconfig

      - name: Update image tags
        run: |
          kubectl set image deployment/helix-backend \
            helix-backend=${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --namespace=helix
          kubectl set image deployment/helix-frontend \
            helix-frontend=${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --namespace=helix
        env:
          KUBECONFIG: /tmp/kubeconfig

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/helix-backend --namespace=helix --timeout=120s
          kubectl rollout status deployment/helix-frontend --namespace=helix --timeout=120s
        env:
          KUBECONFIG: /tmp/kubeconfig
